<svg xmlns="http://www.w3.org/2000/svg" width="52mm" height="90mm" viewBox="0 0 197 340">
  <defs>
    <rect id="shape" width="197" height="340" rx="20" ry="20"/>
    <clipPath id="clip"><use href="#shape"/></clipPath>
  </defs>

  <use href="#shape" fill="none" stroke="#ccc" stroke-width="0.5"/>

  <g clip-path="url(#clip)">
    <rect x="0" y="0" width="197" height="8" fill="#4A8C3F"/>
    <rect x="0" y="332" width="197" height="8" fill="#4A8C3F"/>

    <text x="99" y="40" text-anchor="middle"
      font-family="Georgia, 'Times New Roman', serif"
      font-size="13" font-weight="bold" letter-spacing="5"
      fill="#1A1815">VITA PRESS</text>

    <line x1="68" y1="50" x2="129" y2="50" stroke="#4A8C3F" stroke-width="0.8" opacity="0.6"/>

    <text x="99" y="120" text-anchor="middle"
      font-family="Georgia, 'Times New Roman', serif"
      font-size="42" font-weight="bold"
      fill="#ffffff">Detox</text>

    <text x="99" y="150" text-anchor="middle"
      font-family="Arial, Helvetica, sans-serif"
      font-size="12" font-weight="500" letter-spacing="2"
      fill="#5a5550">CLEAN &amp; REFRESH</text>

    <line x1="40" y1="164" x2="157" y2="164" stroke="#4A8C3F" stroke-width="0.5" opacity="0.35"/>

    <text x="99" y="186" text-anchor="middle"
      font-family="Arial, Helvetica, sans-serif"
      font-size="14" font-weight="500"
      fill="#3a3530">celery · apple</text>
    <text x="99" y="204" text-anchor="middle"
      font-family="Arial, Helvetica, sans-serif"
      font-size="14" font-weight="500"
      fill="#3a3530">cucumber · lime</text>

    <line x1="40" y1="218" x2="157" y2="218" stroke="#4A8C3F" stroke-width="0.5" opacity="0.35"/>

    <text x="99" y="238" text-anchor="middle"
      font-family="Arial, Helvetica, sans-serif"
      font-size="11"
      fill="#5B5550">250ml · Keep refrigerated</text>
    <text x="99" y="253" text-anchor="middle"
      font-family="Arial, Helvetica, sans-serif"
      font-size="11"
      fill="#5B5550">Drink within 3 days</text>

    <text x="99" y="276" text-anchor="middle"
