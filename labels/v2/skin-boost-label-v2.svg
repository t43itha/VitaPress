<svg xmlns="http://www.w3.org/2000/svg" width="52mm" height="90mm" viewBox="0 0 197 340">
  <defs>
    <rect id="shape" width="197" height="340" rx="12" ry="12"/>
    <clipPath id="clip"><use href="#shape"/></clipPath>
  </defs>

  <!-- No background fill — clear plastic shows through -->
  <use href="#shape" fill="none" stroke="none"/>

  <g clip-path="url(#clip)">
    <!-- Top accent bar -->
    <rect x="0" y="0" width="197" height="6" fill="#E8860A"/>

    <!-- Wordmark -->
    <text x="99" y="38" text-anchor="middle"
      font-family="Georgia, 'Times New Roman', serif"
      font-size="12" font-weight="bold" letter-spacing="5"
      fill="#1A1815">VITA PRESS</text>

    <line x1="68" y1="47" x2="129" y2="47" stroke="#E8860A" stroke-width="0.8" opacity="0.5"/>

    <!-- Blend name -->
    <text x="99" y="98" text-anchor="middle"
      font-family="Georgia, 'Times New Roman', serif"
      font-size="38" font-weight="bold"
      fill="#E8860A">Skin</text>
    <text x="99" y="136" text-anchor="middle"
      font-family="Georgia, 'Times New Roman', serif"
      font-size="38" font-weight="bold"
      fill="#E8860A">Boost</text>

    <!-- Tagline -->
    <text x="99" y="160" text-anchor="middle"
      font-family="Arial, Helvetica, sans-serif"
      font-size="10" font-weight="500" letter-spacing="2.5"
      fill="#1A1815">BEAUTY &amp; GLOW</text>

    <line x1="40" y1="173" x2="157" y2="173" stroke="#E8860A" stroke-width="0.5" opacity="0.3"/>

    <!-- Ingredients -->
    <text x="99" y="194" text-anchor="middle"
      font-family="Arial, Helvetica, sans-serif"
      font-size="13" font-weight="400"
      fill="#1A1815">orange · apple</text>
    <text x="99" y="212" text-anchor="middle"
      font-family="Arial, Helvetica, sans-serif"
      font-size="13" font-weight="400"
      fill="#1A1815">carrot · lime</text>

    <line x1="40" y1="226" x2="157" y2="226" stroke="#E8860A" stroke-width="0.5" opacity="0.3"/>

    <!-- Volume & storage -->
    <text x="99" y="246" text-anchor="middle"
      font-family="Arial, Helvetica, sans-serif"
      font-size="10.5"
      fill="#1A1815">250ml · Keep refrigerated</text>
    <text x="99" y="260" text-anchor="middle"
      font-family="Arial, Helvetica, sans-serif"
      font-size="10.5"
      fill="#1A1815">Drink within 3 days</text>

    <!-- Allergen info -->
    <text x="99" y="286" text-anchor="middle"
      font-family="Arial, Helvetica, sans-serif"
      font-size="9"
      fill="#1A1815">No known allergens.</text>
    <text x="99" y="299" text-anchor="middle"
      font-family="Arial, Helvetica, sans-serif"
      font-size="9"
      fill="#1A1815">Made in an environment</text>
    <text x="99" y="311" text-anchor="middle"
      font-family="Arial, Helvetica, sans-serif"
      font-size="9"
      fill="#1A1815">where all 14 known allergens</text>
    <text x="99" y="323" text-anchor="middle"
      font-family="Arial, Helvetica, sans-serif"
      font-size="9"
      fill="#1A1815">may be present.</text>

    <!-- Bottom accent bar -->
    <rect x="0" y="334" width="197" height="6" fill="#E8860A"/>
  </g>
</svg>