<svg xmlns="http://www.w3.org/2000/svg" width="52mm" height="90mm" viewBox="0 0 197 340">
  <defs>
    <rect id="shape" width="197" height="340" rx="20" ry="20"/>
    <clipPath id="clip"><use href="#shape"/></clipPath>
  </defs>

  <use href="#shape" fill="none" stroke="#ccc" stroke-width="0.5"/>

  <g clip-path="url(#clip)">
    <rect x="0" y="0" width="197" height="8" fill="#E8860A"/>
    <rect x="0" y="332" width="197" height="8" fill="#E8860A"/>

    <text x="99" y="40" text-anchor="middle"
      font-family="Georgia, 'Times New Roman', serif"
      font-size="13" font-weight="bold" letter-spacing="5"
      fill="#1A1815">VITA PRESS</text>

    <line x1="68" y1="50" x2="129" y2="50" stroke="#E8860A" stroke-width="0.8" opacity="0.6"/>

    <text x="99" y="100" text-anchor="middle"
      font-family="Georgia, 'Times New Roman', serif"
      font-size="36" font-weight="bold"
      fill="#ffffff">Skin</text>
    <text x="99" y="135" text-anchor="middle"
      font-family="Georgia, 'Times New Roman', serif"
      font-size="36" font-weight="bold"
      fill="#ffffff">Boost</text>

    <text x="99" y="162" text-anchor="middle"
      font-family="Arial, Helvetica, sans-serif"
      font-size="12" font-weight="500" letter-spacing="2"
      fill="#5a5550">BEAUTY &amp; GLOW</text>

    <line x1="40" y1="176" x2="157" y2="176" stroke="#E8860A" stroke-width="0.5" opacity="0.35"/>

    <text x="99" y="198" text-anchor="middle"
      font-family="Arial, Helvetica, sans-serif"
      font-size="14" font-weight="500"
      fill="#3a3530">orange · apple</text>
    <text x="99" y="216" text-anchor="middle"
      font-family="Arial, Helvetica, sans-serif"
      font-size="14" font-weight="500"
      fill="#3a3530">carrot · lime</text>

    <line x1="40" y1="230" x2="157" y2="230" stroke="#E8860A" stroke-width="0.5" opacity="0.35"/>

    <text x="99" y="250" text-anchor="middle"
      font-family="Arial, Helvetica, sans-serif"
      font-size="11"
      fill="#5B5550">250ml · Keep refrigerated</text>
    <text x="99" y="265" text-anchor="middle"
      font-family="Arial, Helvetica, sans-serif"
      font-size="11"
      fill="#5B5550">Drink within 3 days</text>

    <text x="99" y="288" text-anchor="middle"
      font-family="Arial, Helvetica, sans-serif"
      font-size="10"
      fill="#5B5550">No known allergens.</text>
    <text x="99" y="302" text-anchor="middle"
      font-family="Arial, Helvetica, sans-serif"
      font-size="10"
      fill="#5B5550">Made in an environment</text>
    <text x="99" y="314" text-anchor="middle"
      font-family="Arial, Helvetica, sans-serif"
      font-size="10"
      fill="#5B5550">where all 14 known allergens</text>
    <text x="99" y="326" text-anchor="middle"
      font-family="Arial, Helvetica, sans-serif"
      font-size="10"
      fill="#5B5550">may be present.</text>
  </g>
